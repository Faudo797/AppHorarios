<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario Escolar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            text-align: center;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        td {
            background-color: #f9f9f9;
        }
        td input {
            width: 100%;
            padding: 5px;
            margin: 5px 0;
            box-sizing: border-box;
        }
        .time-column {
            width: 120px;
            font-weight: bold;
            background-color: #f2f2f2;
        }
        .add-class {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            padding: 5px;
        }
        .add-class:hover {
            background-color: #45a049;
        }
        .time-slot {
            font-weight: normal;
        }
    </style>
</head>
<body>

    <h1>Horario Escolar</h1>

    <table>
        <thead>
            <tr>
                <th class="time-column">Hora</th>
                <th>Lunes</th>
                <th>Martes</th>
                <th>Miércoles</th>
                <th>Jueves</th>
                <th>Viernes</th>
                <th>Sábado</th>
                <th>Domingo</th>
            </tr>
        </thead>
        <tbody>
            <!-- Horarios de clases -->
            <!-- Cada fila corresponde a un bloque de tiempo -->
            <tr>
                <td class="time-column">6:30 AM - 7:30 AM</td>
                <td><input type="text" placeholder="Clase 1" /></td>
                <td><input type="text" placeholder="Clase 1" /></td>
                <td><input type="text" placeholder="Clase 1" /></td>
                <td><input type="text" placeholder="Clase 1" /></td>
                <td><input type="text" placeholder="Clase 1" /></td>
                <td><input type="text" placeholder="Clase 1" /></td>
                <td><input type="text" placeholder="Clase 1" /></td>
            </tr>
            <tr>
                <td class="time-column">7:30 AM - 8:30 AM</td>
                <td><input type="text" placeholder="Clase 2" /></td>
                <td><input type="text" placeholder="Clase 2" /></td>
                <td><input type="text" placeholder="Clase 2" /></td>
                <td><input type="text" placeholder="Clase 2" /></td>
                <td><input type="text" placeholder="Clase 2" /></td>
                <td><input type="text" placeholder="Clase 2" /></td>
                <td><input type="text" placeholder="Clase 2" /></td>
            </tr>
            <tr>
                <td class="time-column">8:30 AM - 9:30 AM</td>
                <td><input type="text" placeholder="Clase 3" /></td>
                <td><input type="text" placeholder="Clase 3" /></td>
                <td><input type="text" placeholder="Clase 3" /></td>
                <td><input type="text" placeholder="Clase 3" /></td>
                <td><input type="text" placeholder="Clase 3" /></td>
                <td><input type="text" placeholder="Clase 3" /></td>
                <td><input type="text" placeholder="Clase 3" /></td>
            </tr>
            <tr>
                <td class="time-column">9:30 AM - 10:30 AM</td>
                <td><input type="text" placeholder="Clase 4" /></td>
                <td><input type="text" placeholder="Clase 4" /></td>
                <td><input type="text" placeholder="Clase 4" /></td>
                <td><input type="text" placeholder="Clase 4" /></td>
                <td><input type="text" placeholder="Clase 4" /></td>
                <td><input type="text" placeholder="Clase 4" /></td>
                <td><input type="text" placeholder="Clase 4" /></td>
            </tr>
            <tr>
                <td class="time-column">10:30 AM - 11:30 AM</td>
                <td><input type="text" placeholder="Clase 5" /></td>
                <td><input type="text" placeholder="Clase 5" /></td>
                <td><input type="text" placeholder="Clase 5" /></td>
                <td><input type="text" placeholder="Clase 5" /></td>
                <td><input type="text" placeholder="Clase 5" /></td>
                <td><input type="text" placeholder="Clase 5" /></td>
                <td><input type="text" placeholder="Clase 5" /></td>
            </tr>
            <!-- Agregar más filas de horarios según sea necesario -->

        </tbody>
    </table>

    <div style="text-align:center; margin-top: 20px;">
        <button class="add-class">Agregar Clase</button>
    </div>

</body>
</html>

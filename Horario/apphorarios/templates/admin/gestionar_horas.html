<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestionar Horarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Gestionar Horarios</h2>
    <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary mb-3">Volver al Panel</a>
    <div class="row">
        <div class="col-md-6">
            <h4>Agregar Hora</h4>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success">Agregar</button>
            </form>
        </div>
        <div class="col-md-6">
            <h4>Lista de Horarios</h4>
            <form method="get" class="mb-3">
                <input type="text" name="q" class="form-control" placeholder="Buscar por hora inicio o fin" value="{{ query }}">
            </form>
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Hora Inicio</th>
                        <th>Hora Fin</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                {% for hora in horas %}
                    <tr>
                        <td>{{ hora.hora_inicio }}</td>
                        <td>{{ hora.hora_fin }}</td>
                        <td>
                            <a href="{% url 'eliminar_hora' hora.id %}" class="btn btn-danger btn-sm" onclick="return confirm('¿Seguro que deseas eliminar esta hora?');">Eliminar</a>
                            <a href="{% url 'editar_hora' hora.id %}" class="btn btn-warning btn-sm">Editar</a>
                        </td>
                    </tr>
                {% empty %}
                    <tr><td colspan="3">No hay horarios registrados.</td></tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>

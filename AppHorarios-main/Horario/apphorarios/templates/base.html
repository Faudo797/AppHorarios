<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EduSchedule{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f3efe5;
            --bg-soft: rgba(255, 255, 255, 0.7);
            --ink: #1f2a37;
            --muted: #5b6470;
            --primary: #0f5c5c;
            --primary-dark: #093d3f;
            --accent: #d97706;
            --line: rgba(15, 92, 92, 0.14);
            --shadow: 0 18px 45px rgba(15, 35, 50, 0.12);
            --radius-lg: 28px;
            --radius-md: 18px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(13, 148, 136, 0.22), transparent 28%),
                radial-gradient(circle at bottom right, rgba(217, 119, 6, 0.18), transparent 24%),
                linear-gradient(180deg, #faf7ef 0%, var(--bg) 100%);
            color: var(--ink);
            font-family: 'Manrope', sans-serif;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
            letter-spacing: -0.03em;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page-shell {
            width: min(1180px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 1.25rem 0 2rem;
        }

        .hero-card,
        .panel-card,
        .table-card,
        .summary-card,
        .stat-card,
        .schedule-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: var(--shadow);
        }

        .hero-card {
            border-radius: 32px;
            padding: 1.8rem;
            margin-bottom: 1rem;
        }

        .eyebrow {
            text-transform: uppercase;
            font-size: 0.76rem;
            letter-spacing: 0.18em;
            color: var(--accent);
            font-weight: 800;
            margin-bottom: 0.75rem;
        }

        .hero-title {
            font-size: clamp(2rem, 4vw, 3.2rem);
            margin-bottom: 0.4rem;
        }

        .hero-subtitle {
            color: var(--muted);
            max-width: 760px;
            margin-bottom: 0;
        }

        .hero-actions,
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }

        .top-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: 1.5fr 1fr;
        }

        .summary-card,
        .stat-card {
            border-radius: var(--radius-md);
            padding: 1.25rem;
        }

        .summary-card h3,
        .stat-card h3 {
            margin-bottom: 0.3rem;
            font-size: 1rem;
        }

        .summary-card strong,
        .stat-card strong {
            display: block;
            font-size: 1.9rem;
            color: var(--primary-dark);
        }

        .summary-card p,
        .stat-card p,
        .muted {
            color: var(--muted);
            margin-bottom: 0;
        }

        .panel-card,
        .table-card,
        .schedule-card {
            border-radius: var(--radius-lg);
            padding: 1.5rem;
        }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 0.25rem;
        }

        .section-subtitle {
            color: var(--muted);
            margin-bottom: 1.25rem;
        }

        .btn-brand {
            background: var(--primary);
            color: #fff;
            border: none;
        }

        .btn-brand:hover,
        .btn-brand:focus {
            background: var(--primary-dark);
            color: #fff;
        }

        .btn-soft {
            background: rgba(15, 92, 92, 0.08);
            color: var(--primary-dark);
            border: 1px solid rgba(15, 92, 92, 0.12);
        }

        .btn-soft:hover,
        .btn-soft:focus {
            background: rgba(15, 92, 92, 0.14);
            color: var(--primary-dark);
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            background: rgba(217, 119, 6, 0.12);
            color: #9a3412;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .subnav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.65rem;
            margin-bottom: 1rem;
        }

        .subnav a {
            padding: 0.7rem 1rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--line);
            color: var(--primary-dark);
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(15, 35, 50, 0.07);
        }

        .subnav a:hover {
            background: rgba(15, 92, 92, 0.12);
        }

        .field-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        }

        .field-block label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .field-block .helptext,
        .field-block .form-text {
            color: var(--muted);
            font-size: 0.88rem;
        }

        .form-control,
        .form-select {
            border-radius: 14px;
            border: 1px solid rgba(15, 92, 92, 0.18);
            min-height: 48px;
            padding: 0.75rem 0.95rem;
            box-shadow: none;
        }

        select[multiple].form-select {
            min-height: 180px;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: rgba(15, 92, 92, 0.45);
            box-shadow: 0 0 0 0.22rem rgba(15, 92, 92, 0.12);
        }

        .form-error {
            color: #b42318;
            font-size: 0.88rem;
            margin-top: 0.35rem;
        }

        .alert {
            border: 0;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(15, 35, 50, 0.08);
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            border-bottom: none;
            color: var(--muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 800;
        }

        .table td {
            vertical-align: middle;
            border-color: rgba(15, 92, 92, 0.08);
        }

        .table-responsive {
            border-radius: 18px;
            overflow: hidden;
        }

        .empty-state {
            padding: 1.3rem;
            border-radius: 18px;
            background: rgba(15, 92, 92, 0.06);
            color: var(--muted);
        }

        .metric-grid,
        .card-grid,
        .schedule-grid {
            display: grid;
            gap: 1rem;
        }

        .metric-grid {
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        }

        .card-grid {
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }

        .schedule-grid {
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        .schedule-item {
            border-radius: 18px;
            border: 1px solid rgba(15, 92, 92, 0.1);
            background: rgba(255, 255, 255, 0.82);
            padding: 1rem;
        }

        .schedule-item h4 {
            font-size: 1rem;
            margin-bottom: 0.35rem;
        }

        .schedule-item p,
        .schedule-item small {
            color: var(--muted);
        }

        .schedule-meta {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            border-radius: 999px;
            background: rgba(15, 92, 92, 0.08);
            color: var(--primary-dark);
            padding: 0.38rem 0.72rem;
            font-size: 0.85rem;
            font-weight: 700;
        }

        @media (max-width: 991px) {
            .top-grid {
                grid-template-columns: 1fr;
            }

            .page-shell {
                width: min(100% - 1rem, 1180px);
                padding-top: 0.75rem;
            }

            .hero-card,
            .panel-card,
            .table-card,
            .schedule-card {
                padding: 1.2rem;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <main class="page-shell">
        {% block topbar %}{% endblock %}
        {% include 'partials/messages.html' %}
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
